name: Deploy to GitHub Pages

# Run workflow on every push to the main branch
on:
  push:
    branches: [main]

jobs:
  deploy-to-github-pages:
    # use ubuntu-latest image to run steps on
    runs-on: ubuntu-latest
    steps:
      # uses GitHub's checkout action to checkout code from the main branch
      - uses: actions/checkout@v4

      # sets up .NET SDK 10.x
      - name: Setup .NET SDK 10.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # publishes Blazor project to the release folder
      # NOTA: reemplaza "TuProyecto.csproj" con el nombre real de tu proyecto
      - name: Publish .NET Project
        run: dotnet publish Portfolio.csproj -c Release -o release --nologo

      # changes the base-tag in index.html from '/' to match your GitHub Pages repository subdirectory
      # NOTA: reemplaza "tu-repositorio" con el nombre real de tu repositorio en GitHub
      - name: Change base-tag in index.html
        run: sed -i 's/<base href="\/" \/>/<base href="\/l-arroyo.github.io\/" \/>/g' release/wwwroot/index.html

      # copy index.html to 404.html to serve the same file when a file is not found
      - name: copy index.html to 404.html
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      # add .nojekyll file to tell GitHub pages to not treat this as a Jekyll project
      # (Allow files and folders starting with an underscore)
      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      # publishes wwwroot directory to GitHub Pages
      - name: Commit wwwroot to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages # The branch the action should deploy to.
          folder: release/wwwroot # The folder the action should deploy.
